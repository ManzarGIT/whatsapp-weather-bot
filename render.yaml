services:
  - type: web
    name: whatsapp-weather-bot
    env: node
    plan: free          # upgrade to Starter ($7/mo) for always-on
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Add secrets via Render dashboard — never commit actual values
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
